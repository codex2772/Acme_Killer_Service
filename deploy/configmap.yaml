apiVersion: v1
kind: ConfigMap
metadata:
  name: jewel-erp-config
  namespace: jewel-erp
  labels:
    app: jewel-erp
data:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  # Database connection (host will be your RDS endpoint)
  DATABASE_HOST: "your-rds-endpoint.amazonaws.com"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "jewelerpdb"
  # JVM Options
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0"
