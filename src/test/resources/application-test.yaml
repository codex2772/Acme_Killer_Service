spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  security:
    user:
      name: test
      password: test

jwt:
  secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-for-hmac
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000
