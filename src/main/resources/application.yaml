spring:
  application:
    name: jewel-erp

server:
  port: ${PORT:8080}
  shutdown: graceful

# Actuator for K8s health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# App info
info:
  app:
    name: JewelERP
    description: Cloud-native Jewelry Management System
    version: '@project.version@'
