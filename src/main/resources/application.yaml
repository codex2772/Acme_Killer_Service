spring:
  application:
    name: jewel-erp

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/jewelerpdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:jeweladmin}
    password: ${DB_PASSWORD:jewelpass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway Migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

server:
  port: ${PORT:8080}
  shutdown: graceful

# Actuator for K8s health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# App info
info:
  app:
    name: JewelERP
    description: Cloud-native Jewelry Management System
    version: '@project.version@'

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:jewel-erp-default-dev-secret-key-change-in-production-min-256-bits}
  expiration-ms: 86400000       # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

