version: '3.9'

services:
  # ================================
  # Application
  # ================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jewel-erp
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:mysql://mysql:3306/jewelerpdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=jeweladmin
      - DB_PASSWORD=jewelpass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - jewel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ================================
  # MySQL Database
  # ================================
  mysql:
    image: mysql:8.0
    container_name: jewel-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=jewelerpdb
      - MYSQL_USER=jeweladmin
      - MYSQL_PASSWORD=jewelpass
      - MYSQL_ROOT_PASSWORD=rootpass
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jewel-network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "jeweladmin", "-pjewelpass"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jewel-network:
    driver: bridge

volumes:
  mysql_data:
